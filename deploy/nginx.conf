################################################################################
# SecVision — Nginx 反向代理設定（含資安強化）
################################################################################

# 隱藏 Nginx 版本資訊，防止版本資訊洩漏
server_tokens off;

# 全域速率限制：依客戶端 IP，每秒 10 個請求（突增上限 20）
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=2r/s;
# 速率超限回傳 429 Too Many Requests（HTTP 標準），而非預設 503
limit_req_status 429;

server {
    listen 80 default_server;
    # 預設接受所有 Host（IP / 網域皆可）
    server_name _;

    # 限制請求體大小（與後端 50 MB 上限一致）
    client_max_body_size 50m;

    # ── 安全標頭 ──────────────────────────────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff"                          always;
    add_header X-Frame-Options           "DENY"                             always;
    add_header X-XSS-Protection          "1; mode=block"                    always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;

    # 靜態前端
    root  /var/www/secvision;
    index index.html;

    # index.html — 永不快取，確保瀏覽器每次都取得最新版
    # 注意：Nginx location 的 add_header 會覆蓋 server 層，故各 location 需重複宣告安全標頭
    location = /index.html {
        add_header X-Content-Type-Options  "nosniff"                          always;
        add_header X-Frame-Options         "DENY"                             always;
        add_header X-XSS-Protection        "1; mode=block"                    always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;
        add_header Permissions-Policy      "geolocation=(), camera=(), microphone=()" always;
        add_header Cache-Control           "no-cache, no-store, must-revalidate" always;
        add_header Pragma                  "no-cache"                          always;
        expires 0;
    }

    # 本地應用程式碼（JSX/JS）— 停用快取，部署後立即生效
    location ~* \.(jsx|js)$ {
        add_header X-Content-Type-Options  "nosniff"                          always;
        add_header X-Frame-Options         "DENY"                             always;
        add_header X-XSS-Protection        "1; mode=block"                    always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;
        add_header Permissions-Policy      "geolocation=(), camera=(), microphone=()" always;
        add_header Cache-Control           "no-cache, must-revalidate"        always;
        expires 0;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理（含速率限制）
    location /api/ {
        limit_req zone=api_limit burst=30 nodelay;

        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # 登入端點獨立嚴格速率限制：每 IP 每秒最多 2 次
    location /api/auth/token {
        limit_req zone=login_limit burst=5 nodelay;

        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}

